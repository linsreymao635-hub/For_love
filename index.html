<!DOCTYPE html>
<html>
<head>
    <title>Love Message ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #ffe6e6;
        }
        #page {
            position: relative;
            z-index: 2;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #ff4d4d;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #e60000;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            font-size: 20px;
            color: #cc0000;
        }
        button:hover {
            background-color: #e60000;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            font-size: 20px;
            color: #cc0000;
        }
        #sticker {
            margin-top: 16px;
            display: none;
        }
        #sticker.show {
            display: inline-block;
            animation: pop 0.35s ease-out;
        }
        #sticker svg {
            width: 140px;
            height: 140px;
            filter: drop-shadow(0 10px 0 rgba(204, 0, 0, 0.25));
        }
        #heart-burst {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 3;
        }
        #full-screen-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1;
        }
        #full-screen-hearts.show {
            opacity: 1;
        }
        .heart {
            position: absolute;
            width: var(--size);
            height: var(--size);
            background: var(--color);
            transform: translate(-50%, -50%) rotate(45deg);
            animation: float var(--dur) ease-out forwards;
            opacity: 0;
            filter: drop-shadow(0 6px 0 rgba(204, 0, 0, 0.2));
        }
        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
        }
        .heart::before {
            top: -50%;
            left: 0;
        }
        .heart::after {
            left: -50%;
            top: 0;
        }
        .full-heart {
            position: absolute;
            width: var(--size);
            height: var(--size);
            background: var(--color);
            transform: translate(-50%, -50%) rotate(45deg);
            animation: drift var(--dur) ease-in-out forwards;
            opacity: 0;
            filter: drop-shadow(0 8px 0 rgba(204, 0, 0, 0.2));
        }
        .full-heart::before,
        .full-heart::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
        }
        .full-heart::before {
            top: -50%;
            left: 0;
        }
        .full-heart::after {
            left: -50%;
            top: 0;
        }
        @keyframes pop {
            0% { transform: scale(0.4); opacity: 0; }
            70% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes float {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(45deg) scale(0.6);
            }
            15% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(45deg) scale(1.2);
            }
        }
        @keyframes drift {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(45deg) scale(0.7);
            }
            20% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(45deg) scale(1.1);
            }
        }
        p.description {
            font-size: 18px;
            color: #990000;
            margin: 0 0 20px;
        }
        #button-row {
            display: inline-flex;
            gap: 16px;
        }
        button.move {
            position: relative;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>

<div id="page">
    <h2>Do you love me?</h2>
    <div id="button-row">
        <button onclick="showLove()">Yes, I do</button>
        <button id="noButton" class="move" onclick="runAway(this)">No, I don't</button>
    </div>

    <p id="message"></p>
    <div id="sticker" aria-hidden="true">
        <svg viewBox="0 0 200 200" role="img" aria-label="Heart sticker">
            <path d="M100 176c-2 0-4-1-6-2C57 151 20 118 20 82c0-26 20-46 46-46 16 0 31 8 39 21 8-13 23-21 39-21 26 0 46 20 46 46 0 36-37 69-74 92-2 1-4 2-6 2z" fill="#ff4d4d"/>
            <path d="M100 162c-2 0-3-1-4-1-30-19-64-48-64-78 0-21 16-37 37-37 14 0 26 7 33 18 2 3 5 3 7 0 7-11 19-18 33-18 21 0 37 16 37 37 0 30-34 59-64 78-1 0-2 1-4 1z" fill="#ff8a8a"/>
            <circle cx="68" cy="68" r="8" fill="#ffe6e6"/>
        </svg>
    </div>
</div>
<div id="heart-burst" aria-hidden="true"></div>
<div id="full-screen-hearts" aria-hidden="true"></div>

<script>
let fullHeartsTimer = null;
let fullHeartsCleanup = null;

function showLove() {
    document.getElementById("message").innerText = "I love you too. My heart belongs to you forever.";
    const sticker = document.getElementById("sticker");
    sticker.classList.remove("show");
    void sticker.offsetWidth;
    sticker.classList.add("show");
    burstHearts();
    fullScreenHearts();
}

function runAway(button) {
    const directions = ["left", "right", "up", "down"];
    const direction = directions[Math.floor(Math.random() * directions.length)];
    const distance = 80;
    let x = 0;
    let y = 0;

    if (direction === "left") x = -distance;
    if (direction === "right") x = distance;
    if (direction === "up") y = -distance;
    if (direction === "down") y = distance;

    button.style.transform = `translate(${x}px, ${y}px)`;
    // document.getElementById("message").innerText = ` ${direction}. But I still love you.`;
    document.getElementById("sticker").classList.remove("show");
}

function burstHearts() {
    const container = document.getElementById("heart-burst");
    const yesButton = document.querySelector("#button-row button");
    const rect = yesButton.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;
    const colors = ["#ff4d4d", "#ff6b6b", "#ff8a8a", "#ff9a9a"];
    const count = 26;

    container.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        const size = 8 + Math.random() * 14;
        const dx = (Math.random() * 240) - 120;
        const dy = -60 - Math.random() * 140;
        const dur = 0.9 + Math.random() * 0.6;
        const delay = Math.random() * 0.2;
        const color = colors[Math.floor(Math.random() * colors.length)];

        heart.style.left = `${originX}px`;
        heart.style.top = `${originY}px`;
        heart.style.setProperty("--size", `${size}px`);
        heart.style.setProperty("--dx", `${dx}px`);
        heart.style.setProperty("--dy", `${dy}px`);
        heart.style.setProperty("--dur", `${dur}s`);
        heart.style.setProperty("--color", color);
        heart.style.animationDelay = `${delay}s`;

        container.appendChild(heart);
        setTimeout(() => {
            heart.remove();
        }, (dur + delay) * 1000);
    }
}

function fullScreenHearts() {
    const container = document.getElementById("full-screen-hearts");
    const w = window.innerWidth;
    const h = window.innerHeight;
    const baseCount = Math.floor((w * h) / 12000);
    const count = Math.max(50, Math.min(baseCount, 140));
    const colors = ["#ff4d4d", "#ff6b6b", "#ff8a8a", "#ff9a9a"];

    container.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const heart = document.createElement("div");
        heart.className = "full-heart";
        const size = 10 + Math.random() * 26;
        const x = Math.random() * w;
        const y = Math.random() * h;
        const dx = (Math.random() * 120) - 60;
        const dy = (Math.random() * 160) - 80;
        const dur = 1.6 + Math.random() * 1.4;
        const delay = Math.random() * 0.2;
        const color = colors[Math.floor(Math.random() * colors.length)];

        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;
        heart.style.setProperty("--size", `${size}px`);
        heart.style.setProperty("--dx", `${dx}px`);
        heart.style.setProperty("--dy", `${dy}px`);
        heart.style.setProperty("--dur", `${dur}s`);
        heart.style.setProperty("--color", color);
        heart.style.animationDelay = `${delay}s`;

        container.appendChild(heart);
    }

    container.classList.add("show");

    if (fullHeartsTimer) clearTimeout(fullHeartsTimer);
    if (fullHeartsCleanup) clearTimeout(fullHeartsCleanup);

    fullHeartsTimer = setTimeout(() => {
        container.classList.remove("show");
    }, 2200);

    fullHeartsCleanup = setTimeout(() => {
        container.innerHTML = "";
    }, 2600);
}
</script>

</body>
</html>
